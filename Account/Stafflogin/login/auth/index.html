<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSS Authentication</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        body {
            font-family: "Calibri", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a; /* Darker background for the popup */
            color: white;
        }

        .auth-container {
            background-color: #262626; /* Matches your main-box */
            padding: 40px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border-top: 4px solid #722a9e; /* Purple brand accent */
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 { font-size: 1.5em; margin: 0; color: #b366ff; }
        .auth-header p { font-size: 0.9em; color: #888; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
        }

        input[type="email"], 
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: white;
            border-radius: 5px;
            box-sizing: border-box; /* Prevents input from sticking out */
        }

        input:focus {
            outline: none;
            border-color: #722a9e;
            box-shadow: 0 0 5px rgba(114, 42, 158, 0.5);
        }

        .submit-btn {
            width: 100%;
            background-color: #722a9e;
            color: white;
            border: none;
            padding: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 1em;
        }

        .submit-btn:hover { background-color: #8e3bc4; }

        #error-message {
            color: #ff4d4d;
            font-size: 0.9em;
            text-align: center;
            margin-top: 15px;
            min-height: 1.2em;
        }

        /* Footer / Warning area */
        .auth-footer {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid orange;
            border-radius: 5px;
            font-size: 0.8em;
            color: orange;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Staff Login</h1>
            <p>Enter your credentials to continue</p>
        </div>

        <form id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@plasmastarstudios.com" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
            
            <button type="submit" class="submit-btn">Authorize</button>
            <p id="error-message"></p>
        </form>

        <div class="auth-footer">
            ⚠️ DUE TO SECURITY PURPOSES, FORGOT PASSWORD HAS BEEN DISABLED FOR STAFF ACCOUNTS
        </div>
    </div>

    <script>
        // Your existing Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAfQn4lqVPpFkd_QV2WBtphIRiMeOWltTU",
            authDomain: "psspb-dd789.firebaseapp.com",
            projectId: "psspb-dd789",
            storageBucket: "psspb-dd789.firebasestorage.app",
            messagingSenderId: "234369113802",
            appId: "1:234369113802:web:884433b2eaac32b5bc9e33"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // Communication back to the main window
                    localStorage.setItem('CurrentLoggedInUSERID', user.uid);
                    localStorage.setItem("localpssauthreturned", "true");
                    
                    // Small delay so the user feels the success before closing
                    setTimeout(() => { window.close(); }, 500);
                })
                .catch((error) => {
                    errorMsg.textContent = "Error: " + error.message;
                });
        });
    </script>
</body>
</html>
