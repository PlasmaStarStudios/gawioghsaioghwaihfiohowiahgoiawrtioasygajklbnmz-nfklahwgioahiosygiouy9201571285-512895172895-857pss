<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Account | PlasmaStarStudios</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .content-wrapper { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        /* Profile Info Box */
        #profile { background-color: #262626; padding: 25px; border-radius: 12px; margin-bottom: 40px; border-left: 5px solid #b366ff; }
        #profile p { margin: 5px 0; color: #ddd; }
        #profile strong { color: #b366ff; }

        .snippet-container { background-color: #262626; border-radius: 12px; padding: 30px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-left: 5px solid #722a9e; }
        .snippet-header { border-bottom: 1px solid #444; margin-bottom: 20px; padding-bottom: 10px; color: #b366ff; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9em; }

        /* Subscription Card Styling */
        .card-container { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        .card {
            background: #333; border-radius: 12px; overflow: hidden; width: 320px;
            transition: transform 0.3s; border: 1px solid #444; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: #722a9e; }
        .card img { width: 100%; display: block; }
        
        .card-content { padding: 20px; text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #b366ff; }

        /* Controls Area (Hidden by default) */
        .sub-controls {
            background: #222; padding: 15px; border-top: 1px solid #444;
            display: flex; flex-direction: column; gap: 8px;
        }
        
        /* Modernized Buttons */
        .btn-sub {
            padding: 10px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 0.85em; transition: 0.2s;
            background: #444; color: white;
        }
        .btn-sub:hover:not(:disabled) { background: #555; }
        .btn-sub.active { background: #722a9e; color: white; }
        .btn-sub.danger { color: #ff4d4d; }
        .btn-sub.danger:hover:not(:disabled) { background: #4d1a1a; }
        
        .status-msg { font-size: 0.75em; margin-top: 10px; color: #aaa; min-height: 15px; }

        /* Session Overlay */
        #freezeLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 9999; color: white; text-align: center; flex-direction: column; justify-content: center; align-items: center; }
        body.sessionExpired #freezeLayer { display: flex; }
    </style>
</head>
<body>

    <div id="freezeLayer">
        Session expired, please login
        <button id="redirectButton" style="margin-top:20px; padding:10px 20px; background:#ff4444; color:white; border:none; border-radius:5px; cursor:pointer;">Go to Login</button>
    </div>

    <div class="content-wrapper">
        <div id="profile">
            <p>Loading profile...</p>
        </div>

        <section class="snippet-container">
            <div class="snippet-header">📺 Manage Subscriptions</div>
            <div class="card-container" id="cardContainer">
                <p>Checking subscriptions...</p>
            </div>
        </section>
    </div>

    <script>
        // --- Initialization ---
        emailjs.init("YOUR_USER_ID"); // Replace with your actual EmailJS User ID
        const MOCKAPI_USERDATA = "https://670968a0af1a3998baa16e22.mockapi.io/pspninf/personalaccounts";
        const MOCKAPI_SUBS = "https://67b8bf64699a8a7baef5211c.mockapi.io/EMAILSUBSCRIPTIONS/1";

        const firebaseConfig = {
            apiKey: "AIzaSyBnUk38Kg2J0-_rHHnUSgi4ii9wkiihVHs",
            authDomain: "personal-accouts.firebaseapp.com",
            projectId: "personal-accouts",
            storageBucket: "personal-accouts.firebasestorage.app",
            messagingSenderId: "190954179485",
            appId: "1:190954179485:web:ca7dec861890a6470c7d74"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const storedUserId = localStorage.getItem("CurrentLoggedInUSERID");

        const subscriptionsList = {
            "IIFPP": { name: "IIFPP", image: "https://github.com/PlasmaStarStudios/gawioghsaioghwaihfiohowiahgoiawrtioasygajklbnmz-nfklahwgioahiosygiouy9201571285-512895172895-857pss/blob/main/Account/Consumer/iifppbanner.png?raw=true" },
            "RRP": { name: "RRP", image: "https://github.com/PlasmaStarStudios/gawioghsaioghwaihfiohowiahgoiawrtioasygajklbnmz-nfklahwgioahiosygiouy9201571285-512895172895-857pss/blob/main/Account/Consumer/rripbanner.png?raw=true" }
        };

        // --- Core Functions ---
        auth.onAuthStateChanged(user => {
            if (user && user.uid === storedUserId) { fetchUserData(); } 
            else { document.body.classList.add('sessionExpired'); }
        });

        async function fetchUserData() {
            try {
                const response = await fetch(MOCKAPI_USERDATA);
                const data = await response.json();
                const user = data.find(u => u.UserID === storedUserId);
                if (user) {
                    renderProfile(user);
                    renderCards(user.Subscriptions, user.contactemail);
                }
            } catch (e) { console.error(e); }
        }

        function renderProfile(user) {
            document.getElementById('profile').innerHTML = `
                <p><strong>Username:</strong> ${user.ProfileName}</p>
                <p><strong>Email:</strong> ${user.contactemail}</p>
            `;
        }

        function renderCards(subString, userEmail) {
            const container = document.getElementById("cardContainer");
            container.innerHTML = "";
            let keys = subString ? subString.split(/,\s*/) : [];

            keys.forEach(key => {
                if (subscriptionsList[key]) {
                    const info = subscriptionsList[key];
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img src="${info.image}" alt="${info.name}">
                        <div class="card-content">
                            <h3>${info.name} Notifications</h3>
                            <div class="sub-controls">
                                <button class="btn-sub" onclick="handleSub('${key}', 'EVERYTHING', '${userEmail}', this)">Notify: Everything</button>
                                <button class="btn-sub" onclick="handleSub('${key}', 'RELEASES', '${userEmail}', this)">Notify: Only Releases</button>
                                <button class="btn-sub danger" onclick="handleSub('${key}', 'NONE', '${userEmail}', this)">Unsubscribe</button>
                                <div class="status-msg" id="status-${key}">Select a preference</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // --- Subscription Logic ---
        async function handleSub(subKey, type, email, btn) {
            const statusBox = document.getElementById(`status-${subKey}`);
            statusBox.innerText = "Updating...";
            
            // Disable buttons in this card
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            try {
                const res = await fetch(MOCKAPI_SUBS);
                let data = await res.json();

                // Logic to update string lists
                let everythingField = `${subKey}_EVERYTHING`;
                let releasesField = `${subKey}_RELEASES`;

                let listEvery = data[everythingField] ? data[everythingField].split(", ").filter(e => e !== email) : [];
                let listRel = data[releasesField] ? data[releasesField].split(", ").filter(e => e !== email) : [];

                if (type === "EVERYTHING") listEvery.push(email);
                if (type === "RELEASES") listRel.push(email);

                const updatedData = {
                    ...data,
                    [everythingField]: listEvery.join(", "),
                    [releasesField]: listRel.join(", ")
                };

                const putRes = await fetch(MOCKAPI_SUBS, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updatedData)
                });

                if (putRes.ok) {
                    statusBox.innerText = type === "NONE" ? "Unsubscribed" : "Preferences saved!";
                    if (type !== "NONE") sendEmail(email, subKey, type);
                } else {
                    statusBox.innerText = "Error saving.";
                }

            } catch (err) {
                statusBox.innerText = "Error connecting to server.";
            } finally {
                buttons.forEach(b => b.disabled = false);
            }
        }

        async function sendEmail(userEmail, subName, type) {
            const params = {
                to_email: userEmail,
                from_name: "Plasma Star Studios",
                message: `You are now subscribed to ${type} notifications for ${subName}.`
            };
            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', params);
        }

        document.getElementById("redirectButton").onclick = () => window.location.href = "https://www.plasmastarstudios.com/-5/personal";
    </script>
</body>
</html>
